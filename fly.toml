# fly.toml — Fly.io deployment config
# Deploy: fly launch (first time) or fly deploy (subsequent)
# Docs: https://fly.io/docs/reference/configuration/

app = "riptide"
primary_region = "iad"

[build]

[env]
  PORT = "3001"
  DOWNLOADS_DIR = "/downloads"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "riptide_downloads"
  destination = "/downloads"
